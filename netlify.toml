[build]
  command = "cd client && npm install && npm run build && cd ../server && npm install && npm run build"
  publish = "client/dist"
  functions = "server/dist/functions"

[dev]
  command = "cd client && npm run dev"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
